<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SuperOne Market</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperOne Market">
<link rel="manifest" href="manifest.json">
<script>
// Register the service worker (only works when hosted, e.g. GitHub Pages —
// silently skipped when opened as a local file, so nothing breaks).
// Also checks for a newer version on every load and applies it automatically,
// so pushing an update to GitHub just shows up next time — no cache clearing.
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      reg.update();
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', function() {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // A new version is ready — activate and reload once to show it.
            newWorker.postMessage && newWorker.postMessage('skipWaiting');
            window.location.reload();
          }
        });
      });
    }).catch(function(){});
  });
}
</script>
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E9CF7A">
<style>
  :root{
    --bg:#E9CF7A;
    --surface:#FFFFFF;
    --ink:#2A2417;
    --ink-soft:#8C8069;
    --line:#EDE3C8;
    --blue:#C79A1E;
    --blue-deep:#A67F16;
    --blue-tint:#FBF0C8;
    --tang:#C79A1E;
    --tang-deep:#A67F16;
    --tang-tint:#FBF0C8;
    --lime:#C79A1E;
    --pink:#C79A1E;
    --violet:#C79A1E;
    --gold:#C79A1E;
    --red:#C0392B;
    --paper:#E9CF7A;
    --amber:#C79A1E;
    --amber-deep:#A67F16;
    --amber-tint:#FBF0C8;
    --green:#C79A1E;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--ink); padding-bottom:96px; }
  .hidden { display:none !important; }
  .wrap { max-width:640px; margin:0 auto; }
  .display { font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif; font-weight:800; letter-spacing:-.02em; }

  /* Header */
  header { position:sticky; top:0; z-index:10; background:#E9CF7A; padding:16px 16px 12px; box-shadow:0 2px 10px rgba(160,120,20,.18); }
  .header-row { display:flex; justify-content:space-between; align-items:center; max-width:640px; margin:0 auto; gap:10px; }
  .title-block { display:flex; flex-direction:column; line-height:1.05; }
  .eyebrow { font-size:10px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:#8A6B1E; margin-bottom:3px; }
  .title { font-size:23px; font-weight:800; color:#4A3A1A; margin:0; letter-spacing:-.02em; }
  .header-btns { display:flex; gap:8px; flex-shrink:0; }
  .icon-btn { background:rgba(74,58,26,.14); color:#4A3A1A; border:none; width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; }
  .print-btn { position:relative; background:#4A3A1A; color:#F7EDD4; border:none; padding:0 16px; height:40px; border-radius:11px; font-weight:800; font-size:13px; letter-spacing:.03em; text-transform:uppercase; display:flex; align-items:center; gap:7px; box-shadow:0 2px 8px rgba(74,58,26,.3); }
  .cart-badge { display:none; position:absolute; top:-6px; right:-6px; background:var(--lime); color:#fff; font-size:11px; width:20px; height:20px; border-radius:50%; align-items:center; justify-content:center; font-weight:800; border:2px solid #fff; }

  .search-wrap { position:relative; max-width:640px; margin:12px auto 0; }
  #search-input { width:100%; background:rgba(255,255,255,.95); border:none; padding:12px 34px 12px 38px; border-radius:11px; outline:none; font-size:14px; font-weight:600; color:var(--ink); box-shadow:0 2px 8px rgba(20,23,38,.08); }
  #search-input::placeholder { color:var(--ink-soft); font-weight:500; }
  .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--blue); display:flex; }
  .clear-btn { display:none; position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--ink-soft); font-size:14px; font-weight:700; width:22px; height:22px; }

  .pills { display:flex; overflow-x:auto; gap:7px; padding:14px 16px 10px; max-width:640px; margin:0 auto; scrollbar-width:none; }
  .pills::-webkit-scrollbar { display:none; }
  .pill { white-space:nowrap; padding:7px 14px; border-radius:20px; font-size:12.5px; font-weight:700; border:2px solid var(--line); background:var(--surface); color:var(--ink-soft); }
  .pill.active { background:var(--blue); color:#fff; border-color:var(--blue); box-shadow:0 2px 8px rgba(31,58,95,.28); }

  /* Item list */
  #item-list { padding:8px 16px 16px; display:flex; flex-direction:column; gap:9px; max-width:640px; margin:0 auto; }
  .item-row { display:flex; align-items:center; justify-content:space-between; padding:10px; border-radius:14px; border:2px solid var(--line); background:var(--surface); border-left-width:5px; box-shadow:0 1px 4px rgba(20,23,38,.04); transition:transform .08s ease; }
  .item-row.active { background:var(--blue-tint); border-color:var(--blue); }
  .item-thumb { position:relative; width:50px; height:50px; border-radius:11px; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-right:11px; flex-shrink:0; color:#fff; font-weight:800; font-size:17px; }
  .item-thumb img { width:100%; height:100%; object-fit:cover; }
  .item-thumb input { position:absolute; inset:0; opacity:0; width:100%; height:100%; }
  .item-thumb .cam { opacity:.85; display:flex; }
  .item-info { flex:1; min-width:0; padding-right:8px; }
  .item-cat { font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; margin-bottom:2px; }
  .item-name { font-weight:600; font-size:15.5px; line-height:1.25; color:var(--ink); word-break:break-word; }
  .item-name.active { font-weight:800; }
  .item-name.new { color:var(--lime); }

  .qty-box { display:flex; align-items:center; gap:0; background:var(--bg); border-radius:11px; flex-shrink:0; overflow:hidden; }
  .qty-btn { width:36px; height:36px; border:none; font-size:18px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .qty-btn.minus { background:#fff; color:var(--ink-soft); box-shadow:inset 0 0 0 2px var(--line); }
  .qty-btn.plus { background:var(--lime); color:#fff; }
  .item-row.active .qty-btn.plus { background:var(--blue); }
  .qty-val { width:30px; text-align:center; font-weight:800; font-size:18px; color:var(--ink); font-variant-numeric:tabular-nums; }
  .qty-val.active { color:var(--blue); }

  .empty-state { text-align:center; padding:56px 20px; color:var(--ink-soft); }
  .empty-state .add-new { margin-top:14px; color:#fff; font-weight:700; background:var(--blue); padding:10px 20px; border-radius:20px; font-size:13.5px; display:inline-block; border:none; box-shadow:0 2px 8px rgba(31,58,95,.28); }

  /* Cigarette brand sub-categories */
  .cig-group { margin-bottom:9px; }
  .cig-head { width:100%; display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:14px; border:2px solid var(--line); background:var(--surface); text-align:left; box-shadow:0 1px 4px rgba(28,26,23,.04); }
  .cig-head.open { border-color:var(--blue); background:var(--blue-tint); }
  .cig-dot { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; flex-shrink:0; }
  .cig-name { flex:1; font-weight:800; font-size:16px; color:var(--ink); }
  .cig-count { background:var(--lime); color:#fff; font-weight:800; font-size:12px; min-width:22px; height:22px; border-radius:11px; display:flex; align-items:center; justify-content:center; padding:0 6px; }
  .cig-chevron { color:var(--ink-soft); transition:transform .15s ease; flex-shrink:0; }
  .cig-head.open .cig-chevron { transform:rotate(90deg); }
  .cig-items { display:flex; flex-direction:column; gap:9px; padding:9px 0 4px 12px; }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(33,29,23,.55); z-index:50; display:flex; align-items:flex-end; justify-content:center; padding:16px; }
  .modal { background:var(--paper); width:100%; max-width:420px; border-radius:20px; padding:22px; border:1.5px solid var(--line); }
  .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .modal-head h2 { font-size:17px; font-weight:700; margin:0; }
  .modal-close { background:var(--surface); border:1.5px solid var(--line); width:32px; height:32px; border-radius:9px; font-size:14px; }
  .photo-pick { width:92px; height:92px; margin:0 auto 16px; border-radius:14px; border:1.5px dashed var(--amber); background:var(--amber-tint); display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; gap:4px; }
  .photo-pick span { font-size:11px; font-weight:700; color:var(--amber-deep); }
  .photo-pick img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .photo-pick input { position:absolute; inset:0; opacity:0; }
  label.field-label { display:block; font-size:12.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
  .field-input, .field-select { width:100%; padding:12px 14px; background:var(--surface); border:1.5px solid var(--line); border-radius:10px; font-size:16px; font-weight:500; color:var(--ink); margin-bottom:14px; }
  .field-input:focus, .field-select:focus { outline:none; border-color:var(--amber); }
  .submit-btn { width:100%; background:var(--tang); color:#fff; font-weight:800; font-size:15px; text-transform:uppercase; letter-spacing:.03em; padding:14px; border:none; border-radius:11px; box-shadow:0 2px 8px rgba(184,84,46,.35); }

  /* Print view */
  .toolbar { position:sticky; top:0; background:#E9CF7A; color:#2A2417; padding:14px 16px; display:flex; flex-direction:column; gap:12px; z-index:20; }
  .toolbar-top { display:flex; justify-content:space-between; align-items:center; max-width:640px; margin:0 auto; width:100%; }
  .back-btn { background:none; border:none; color:#7A5E22; font-weight:700; font-size:14px; display:flex; align-items:center; gap:4px; padding:0; }
  .toolbar-actions { display:flex; gap:10px; max-width:640px; margin:0 auto; width:100%; }
  .btn-print { flex:1; background:#4A3A1A; color:#F7EDD4; border:none; padding:13px; border-radius:10px; font-weight:800; text-transform:uppercase; letter-spacing:.03em; display:flex; align-items:center; justify-content:center; gap:7px; font-size:14px; }
  .btn-clear { background:rgba(74,58,26,.16); color:#7A5E22; border:none; padding:0 16px; border-radius:10px; display:flex; align-items:center; }

  .report { background:var(--surface); padding:20px 16px; max-width:680px; margin:0 auto; }
  .report-head { border-bottom:3px solid var(--ink); padding-bottom:14px; margin-bottom:22px; }
  .report-head .eyebrow { color:var(--amber-deep); }
  .report-head h1 { font-size:27px; font-weight:700; margin:0; letter-spacing:-.01em; }
  .report-head h2 { font-size:13px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em; margin:3px 0 0; }
  .report-meta { display:flex; justify-content:space-between; margin-top:10px; font-weight:700; font-size:14px; color:var(--ink); }
  .cat-section { margin-bottom:22px; break-inside:avoid; }
  .cat-title { font-family: Georgia, "Noto Serif", serif; font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--ink); padding:0 0 6px; margin:0 0 6px; border-bottom:1.5px solid var(--ink); }
  table { width:100%; border-collapse:collapse; }
  td { padding:8px 4px; border-bottom:1px solid var(--line); font-weight:600; font-size:14.5px; vertical-align:middle; color:var(--ink); }
  .qty-chip { display:inline-flex; align-items:center; justify-content:center; min-width:28px; height:26px; font-weight:800; font-size:14.5px; border:1.5px solid var(--ink); border-radius:6px; font-variant-numeric:tabular-nums; }
  .empty-order { text-align:center; padding:70px 20px; color:var(--ink-soft); font-weight:600; }

  @media print {
    @page { margin: 9mm; }
    header, .toolbar, .pills, .search-wrap { display:none !important; }
    body { padding-bottom:0; background:#fff; font-size:8pt; }
    .report { padding:0; max-width:none; }
    .report-head { padding-bottom:4pt; margin-bottom:6pt; border-bottom-width:1.5pt; }
    .report-head .eyebrow { display:none; }
    .report-head h1 { font-size:14pt; }
    .report-head h2 { font-size:8pt; margin-top:1pt; }
    .report-meta { margin-top:3pt; font-size:8pt; }
    .print-cols { display:flex; gap:8pt; }
    .print-cols > .print-col { flex:1; min-width:0; }
    .cat-section { margin-bottom:6pt; break-inside: avoid; page-break-inside: avoid; }
    .cat-title { font-size:8pt; padding-bottom:1.5pt; margin-bottom:2pt; border-bottom-width:0.75pt; letter-spacing:.01em; }
    table { border-collapse:collapse; }
    td { padding:1.2pt 3pt; font-size:8pt; border-bottom-width:0.5pt; line-height:1.15; }
    .qty-chip { min-width:13pt; height:11pt; font-size:7.5pt; border-width:0.75pt; border-radius:2pt; }
    .qty-chip { border-color:#000; }
    .cat-title, .report-head { border-color:#000; }
  }
</style>
</head>
<body>

<div id="shop-view">
  <header>
    <div class="header-row">
      <div class="title-block">
        <span class="eyebrow">Weekly Restock</span>
        <h1 class="title display">SuperOne Market</h1>
      </div>
      <div class="header-btns">
        <button class="icon-btn" onclick="switchView('history')" title="Order history">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        </button>
        <button class="icon-btn" onclick="openAddModal()" title="Add item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="print-btn" onclick="switchView('print')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
          Print
          <span id="cart-count" class="cart-badge">0</span>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
      <input id="search-input" type="text" placeholder="Search items..." oninput="handleSearch(this.value)">
      <button id="clear-search" class="clear-btn" onclick="clearSearchField()">✕</button>
    </div>
  </header>
  <div class="pills" id="category-pills"></div>
  <div id="item-list"></div>
</div>

<div id="print-view" class="hidden">
  <div class="toolbar">
    <div class="toolbar-top">
      <button class="back-btn" onclick="switchView('shop')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Back to Store
      </button>
      <div id="print-header-count" style="font-weight:700; font-size:14px;">0 Items in Order</div>
    </div>
    <div class="toolbar-actions">
      <button class="btn-print" onclick="printOrder()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
        Print / Save PDF
      </button>
      <button class="btn-clear" onclick="clearEntireOrder()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    </div>
  </div>
  <div class="report">
    <div class="report-head">
      <span class="eyebrow">Order Pad</span>
      <h1 class="display">SuperOne Market</h1>
      <h2>Weekly Order Report</h2>
      <div class="report-meta">
        <div id="report-date">Date:</div>
        <div id="report-total">Total Items: 0</div>
      </div>
    </div>
    <div id="print-report-content" class="print-cols"></div>
  </div>
</div>

<div id="history-view" class="hidden">
  <div class="toolbar">
    <div class="toolbar-top">
      <button class="back-btn" onclick="switchView('shop')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Back to Store
      </button>
      <div style="font-weight:700; font-size:14px;">Order History</div>
    </div>
  </div>
  <div id="history-list" style="padding:16px; max-width:640px; margin:0 auto;"></div>
  <div style="padding:0 16px 24px; max-width:640px; margin:0 auto;">
    <button onclick="resetCatalogToLatest()" style="width:100%; background:var(--surface); color:var(--red); font-weight:700; font-size:13px; border:1.5px solid var(--line); border-radius:9px; padding:12px;">Update product list to latest version</button>
    <p style="font-size:11px; color:var(--ink-soft); margin:8px 2px 0; line-height:1.4;">Refreshes all categories and items to the newest version. Your saved order history is kept. Any current unsaved quantities will be cleared.</p>
  </div>
</div>

<div id="add-modal" class="modal-bg hidden">
  <div class="modal">
    <div class="modal-head">
      <h2>Add New Item</h2>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="photo-pick" id="photo-pick">
      <div id="modal-img-placeholder">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--amber-deep); margin:0 auto; display:block;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Add Photo</span>
      </div>
      <img id="modal-img-preview" class="hidden">
      <input type="file" accept="image/*" capture="environment" onchange="handleModalImage(this)">
    </div>
    <label class="field-label">Item Name</label>
    <input type="text" id="new-item-name" class="field-input" placeholder="e.g. Swisher Banana...">
    <label class="field-label">Category</label>
    <select id="new-item-cat" class="field-select"></select>
    <button class="submit-btn" onclick="submitNewItem()">Add to Order List</button>
  </div>
</div>


<script>

// Safari blocks localStorage on file:// pages (opened directly from Files app),
// which otherwise throws and breaks the whole app into a blank screen.
// Fall back to a simple in-memory store so the app still works either way —
// on iPhone, data just won't persist between opens unless hosted as a link.
let memoryFallback = {};
let storageBlocked = false;
const safeStorage = {
  getItem(key) {
    try { return localStorage.getItem(key); }
    catch (e) { storageBlocked = true; return memoryFallback[key] || null; }
  },
  setItem(key, value) {
    try { localStorage.setItem(key, value); }
    catch (e) { storageBlocked = true; memoryFallback[key] = value; }
  }
};

let catalog = [];
function buildFreshCatalog() {
  const fresh = [];
  let idCounter = 1;
  Object.entries(initialData).forEach(([category, items]) => {
    items.forEach(name => {
      fresh.push({ id: idCounter++, name, category, orderQty: 0, image: null });
    });
  });
  return fresh;
}
try {
  const savedCatalog = safeStorage.getItem('superone_market_catalog');
  catalog = savedCatalog ? JSON.parse(savedCatalog) : buildFreshCatalog();
  if (!Array.isArray(catalog) || catalog.length === 0) catalog = buildFreshCatalog();
  // One-time recategorization: Slapwood and Hemp items used to be lumped
  // into "Black & Mild" — move them to their own categories if found.
  let recategorized = false;
  catalog.forEach(item => {
    if (item.category === 'Black & Mild' && /^Slapwood - /.test(item.name)) {
      item.category = 'Slapwood';
      item.name = item.name.replace(/^Slapwood - /, '');
      recategorized = true;
    } else if (item.category === 'Black & Mild' && (item.name === 'Harvest Hemp' || item.name === 'True Hemp')) {
      item.category = 'Hemp Wraps';
      recategorized = true;
    }
  });
  if (recategorized) safeStorage.setItem('superone_market_catalog', JSON.stringify(catalog));

  // Rename old Lil Leaf flavor shorthand to the corrected shelf-accurate names.
  const lilLeafRenames = { 'Russ Cream': 'Russian Cream', 'Orig': 'Original', 'Cognac': 'Cognac & Honey', 'Wht Rum': 'White Rum' };
  let llRenamed = false;
  catalog.forEach(item => {
    if (item.category === 'Lil Leaf' && lilLeafRenames[item.name]) {
      item.name = lilLeafRenames[item.name];
      llRenamed = true;
    }
  });
  if (llRenamed) safeStorage.setItem('superone_market_catalog', JSON.stringify(catalog));

  // Sync: any item in the base catalog that's missing from the saved list gets
  // added at qty 0, without touching items or quantities the person already has.
  let nextId = Date.now();
  let added = false;
  Object.entries(initialData).forEach(([category, items]) => {
    items.forEach(name => {
      const exists = catalog.some(item => item.category === category && item.name.toLowerCase() === name.toLowerCase());
      if (!exists) {
        catalog.push({ id: nextId++, name, category, orderQty: 0, image: null });
        added = true;
      }
    });
  });
  if (added) safeStorage.setItem('superone_market_catalog', JSON.stringify(catalog));
} catch (e) {
  catalog = buildFreshCatalog();
}

// One-time cleanup: any photo saved before compression was added is still
// full camera resolution and can be several MB — that's the usual cause of
// slow taps and slow print preview. Shrink those down in the background.
function migrateOversizedImages() {
  const targets = catalog.filter(item => item.image && item.image.length > 60000);
  if (targets.length === 0) return;
  let remaining = targets.length;
  targets.forEach(item => {
    const img = new Image();
    img.onload = function() {
      const maxDim = 220;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
      else if (h >= w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      item.image = canvas.toDataURL('image/jpeg', 0.6);
      if (--remaining === 0) { saveState(); renderItems(); }
    };
    img.onerror = function() { if (--remaining === 0) { saveState(); renderItems(); } };
    img.src = item.image;
  });
}
try { migrateOversizedImages(); } catch (e) { /* non-fatal, item photos just won't be optimized this run */ }

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Give each category a consistent signature color so the list reads like a
// colorful shelf. Colors are assigned by hashing the category name to a fixed palette.
const CAT_PALETTE = ['#B8912F'];
function catColor(cat) {
  let h = 0;
  for (let i = 0; i < cat.length; i++) h = (h * 31 + cat.charCodeAt(i)) >>> 0;
  return CAT_PALETTE[h % CAT_PALETTE.length];
}
function catInitials(cat) {
  const clean = cat.replace(/^Cig - /, '');
  const words = clean.split(/[\s&-]+/).filter(Boolean);
  if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
  return clean.slice(0, 2).toUpperCase();
}

// Shrinks any photo down to a small thumbnail before it's stored, so saving
// stays instant even after adding lots of photos (full camera photos are
// several MB each and would otherwise slow every tap down).
function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const maxDim = 220;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
      else if (h >= w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveState() {
  safeStorage.setItem('superone_market_catalog', JSON.stringify(catalog));

let expandedCigBrand = null;

function renderItems() {
  const container = document.getElementById('item-list');
  container.innerHTML = '';
  const q = currentSearchQuery.toLowerCase();

  // Special two-level view: the Cigarettes tab groups items by brand sub-category.
  if (currentCategoryFilter === 'Cigarettes' && !currentSearchQuery) {
    let html = '';
    cigBrands.forEach(brand => {
      const brandName = brand.slice(6);
      const items = catalog.filter(i => i.category === brand);
      if (items.length === 0) return;
      const color = catColor(brand);
      const brandTotal = items.reduce((s, i) => s + i.orderQty, 0);
      const isOpen = expandedCigBrand === brand;
      html += `<div class="cig-group">
        <button class="cig-head${isOpen ? ' open' : ''}" onclick="toggleCigBrand('${esc(brand)}')">
          <span class="cig-dot" style="background:${color};">${esc(catInitials(brand))}</span>
          <span class="cig-name">${esc(brandName)}</span>
          ${brandTotal > 0 ? `<span class="cig-count">${brandTotal}</span>` : ''}
          <svg class="cig-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        ${isOpen ? `<div class="cig-items">${items.map(itemRowHtml).join('')}</div>` : ''}
      </div>`;
    });
    container.innerHTML = html || '<div class="empty-state"><p style="margin:0;font-weight:600;">No cigarettes found.</p></div>';
    return;
  }

  const filtered = catalog.filter(item => {
    const matchesSearch = item.name.toLowerCase().includes(q) || item.category.toLowerCase().includes(q);
    let matchesCat;
    if (currentCategoryFilter === 'All') matchesCat = true;
    else if (currentCategoryFilter === 'Cigarettes') matchesCat = item.category.indexOf('Cig - ') === 0;
    else matchesCat = item.category === currentCategoryFilter;
    return matchesSearch && matchesCat;
  });

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="margin:0 auto 10px; display:block; opacity:.5;"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <p style="margin:0; font-weight:600;">No items found.</p>
        ${currentSearchQuery ? `<button class="add-new" onclick="openAddModalWithSearch('${esc(currentSearchQuery)}')">+ Add "${esc(currentSearchQuery)}" as New Item</button>` : ''}
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(itemRowHtml).join('');
}

function toggleCigBrand(brand) {
  expandedCigBrand = (expandedCigBrand === brand) ? null : brand;
  renderItems();
}

function changeQty(id, delta) {
  catalog = catalog.map(item => item.id === id ? { ...item, orderQty: Math.max(0, item.orderQty + delta) } : item);
  saveState();
  renderItems();
}

function uploadItemImage(id, input) {
  const file = input.files[0];
  if (!file) return;
  compressImage(file, function(dataUrl) {
    catalog = catalog.map(item => item.id === id ? { ...item, image: dataUrl } : item);
    saveState();
    renderItems();
  });
}

function handleSearch(val) {
  currentSearchQuery = val;
  const clearBtn = document.getElementById('clear-search');
  clearBtn.style.display = val ? 'block' : 'none';
  if (val && currentCategoryFilter !== 'All') currentCategoryFilter = 'All';
  renderCategories();
  renderItems();
}

function clearSearchField() {
  document.getElementById('search-input').value = '';

function updateGlobalBadges() {

function renderPrintReport() {
  const container = document.getElementById('print-report-content');
  container.innerHTML = '';
  const ordered = catalog.filter(i => i.orderQty > 0);
  if (ordered.length === 0) {
    container.innerHTML = '<div class="empty-order">Your order is empty.<br>Go back and select some quantities.</div>';
    return;
  }
  const groups = {};
  ordered.forEach(i => { (groups[i.category] = groups[i.category] || []).push(i); });

  function sectionHtml(category, items) {
    let rows = '';
    items.forEach(item => {
      rows += `<tr>
        <td><span class="qty-chip">${item.orderQty}</span></td>
        <td>${esc(item.name)}</td>
      </tr>`;
    });
    return `<div class="cat-section">
      <h2 class="cat-title">${esc(category)}</h2>
      <table>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  // Distribute categories across three columns, balancing by row count so all sides finish about evenly.
  const entries = Object.entries(groups);
  const colHtml = ['', '', ''];
  const colCount = [0, 0, 0];
  entries.forEach(([category, items]) => {
    let target = 0;
    for (let c = 1; c < colCount.length; c++) { if (colCount[c] < colCount[target]) target = c; }
    colHtml[target] += sectionHtml(category, items);
    colCount[target] += items.length + 1;
  });

  container.innerHTML = `
    <div class="print-col">${colHtml[0]}</div>
    <div class="print-col">${colHtml[1]}</div>
    <div class="print-col">${colHtml[2]}</div>`;
}

function buildReportHtml() {
  const ordered = catalog.filter(i => i.orderQty > 0);
  const groups = {};
  ordered.forEach(i => { (groups[i.category] = groups[i.category] || []).push(i); });

  function sectionHtml(category, items) {
    let rows = '';
    items.forEach(item => {
      rows += `<tr><td><span class="qty-chip">${item.orderQty}</span></td><td>${esc(item.name)}</td></tr>`;
    });
    const label = category.indexOf('Cig - ') === 0 ? category.slice(6) : category;
    return `<div class="cat-section"><h2 class="cat-title">${esc(label)}</h2><table><tbody>${rows}</tbody></table></div>`;
  }

  // Distribute a set of categories across 3 balanced columns and return the page HTML.
  function buildPage(entries) {
    const colHtml = ['', '', ''];
    const colCount = [0, 0, 0];
    entries.forEach(([category, items]) => {
      let target = 0;
      for (let c = 1; c < colCount.length; c++) { if (colCount[c] < colCount[target]) target = c; }
      colHtml[target] += sectionHtml(category, items);
      colCount[target] += items.length + 1;
    });
    return `<div class="print-cols"><div class="print-col">${colHtml[0]}</div><div class="print-col">${colHtml[1]}</div><div class="print-col">${colHtml[2]}</div></div>`;
  }

  // Separate cigarettes (any "Cig - Brand" category) from everything else.
  const frontEntries = [];
  const cigEntries = [];
  Object.entries(groups).forEach(entry => {
    if (entry[0].indexOf('Cig - ') === 0) cigEntries.push(entry);
    else frontEntries.push(entry);
  });

  const total = ordered.reduce((s, i) => s + i.orderQty, 0);
  const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

  let bodyContent;

    bodyContent = '<div style="text-align:center;padding:60px 20px;color:#8A8175;font-weight:600;">Your order is empty.</div>';

    </div>`;
    // Back page (only if there are cigarette items): forced page break so it prints on the reverse side when duplex.
    if (cigEntries.length) {
      bodyContent += `<div class="page page-break">
        <div class="report-head">
          <h1 class="display">SuperOne Market</h1>
          <h2>Weekly Order Report &mdash; Cigarettes</h2>
          <div class="report-meta"><div>Date: ${dateStr}</div><div>Cigarette Items: ${cigEntries.reduce((s,e)=>s+e[1].reduce((a,i)=>a+i.orderQty,0),0)}</div></div>
        </div>
        ${buildPage(cigEntries)}
      </div>`;
    }
  }

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SuperOne Market Order</title>
<style>
  @page { margin: 9mm; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; color:#211D17; font-size:8pt; }

  .report-head h1 { font-size:14pt; margin:0; }

  .report-meta { display:flex; justify-content:space-between; margin-top:3pt; font-size:8pt; font-weight:700; }
  .print-cols { display:flex; gap:8pt; }
  .print-col { flex:1; min-width:0; }
  .cat-section { margin-bottom:6pt; break-inside:avoid; page-break-inside:avoid; }
  .cat-title { font-family:Georgia,"Noto Serif",serif; font-size:8pt; font-weight:700; text-transform:uppercase; padding-bottom:1.5pt; margin:0 0 2pt; border-bottom:0.75pt solid #000; }
  table { width:100%; border-collapse:collapse; }
  td { padding:1.2pt 3pt; font-size:8pt; font-weight:600; border-bottom:0.5pt solid #E6DFCF; line-height:1.15; }
  .qty-chip { display:inline-flex; align-items:center; justify-content:center; min-width:13pt; height:11pt; font-weight:800; font-size:7.5pt; border:0.75pt solid #000; border-radius:2pt; }
</style></head>
<body>
  ${bodyContent}
</body></html>`;
}

function saveOrderToHistory() {
  const ordered = catalog.filter(i => i.orderQty > 0);
  if (ordered.length === 0) return;
  let history = [];
  try { history = JSON.parse(safeStorage.getItem('superone_market_history') || '[]'); } catch (e) { history = []; }
  history.unshift({
    date: new Date().toISOString(),
    totalCount: ordered.reduce((s, i) => s + i.orderQty, 0),
    items: ordered.map(i => ({ name: i.name, category: i.category, qty: i.orderQty }))
  });
  if (history.length > 104) history = history.slice(0, 104); // keep ~2 years of weekly orders
  safeStorage.setItem('superone_market_history', JSON.stringify(history));
}

function printOrder() {
  const win = window.open('', '_blank');
  if (!win) { alert('Please allow pop-ups for this app, then tap Print again.'); return; }
  saveOrderToHistory();
  win.document.open();
  win.document.write(buildReportHtml());
  win.document.close();
  setTimeout(function() { win.focus(); win.print(); }, 250);
}
function resetCatalogToLatest() {
  if (!confirm('Rebuild the product list to the latest version? Your order history is kept, but any quantities you have not printed yet will be cleared.')) return;
  catalog = buildFreshCatalog();
  safeStorage.setItem('superone_market_catalog', JSON.stringify(catalog));
  updateGlobalBadges();
  switchView('shop');
}

function renderHistory() {
  const container = document.getElementById('history-list');
  let history = [];
  try { history = JSON.parse(safeStorage.getItem('superone_market_history') || '[]'); } catch (e) { history = []; }

  if (history.length === 0) {
    container.innerHTML = '<div class="empty-state"><p style="margin:0;font-weight:600;">No past orders yet.</p><p style="margin:6px 0 0;font-size:13px;">Each time you print an order, it gets saved here automatically.</p></div>';
    return;
  }

  container.innerHTML = '';
  history.forEach((order, idx) => {
    const d = new Date(order.date);
    const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    const card = document.createElement('div');
    card.className = 'item-row';
    card.style.cssText = 'flex-direction:column; align-items:stretch; margin-bottom:10px; cursor:pointer;';

    let detailRows = '';
    order.items.forEach(it => {
      detailRows += `<tr><td style="width:34px;"><span class="qty-chip" style="min-width:24px;height:22px;font-size:13px;">${it.qty}</span></td><td>${esc(it.name)}</td><td style="color:var(--ink-soft);font-size:11px;text-transform:uppercase;">${esc(it.category)}</td></tr>`;
    });

    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;" onclick="toggleHistoryDetail(${idx})">
        <div>
          <div style="font-weight:700; font-size:15px;">${dateStr}</div>
          <div style="font-size:12px; color:var(--ink-soft); font-weight:600;">${order.items.length} products, ${order.totalCount} total items</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div id="hist-detail-${idx}" class="hidden" style="margin-top:10px; border-top:1.5px solid var(--line); padding-top:8px;">
        <table style="width:100%;">${detailRows}</table>
        <button onclick="loadPastOrder(${idx}); event.stopPropagation();" style="margin-top:10px; width:100%; background:var(--amber-tint); color:var(--amber-deep); font-weight:700; font-size:13px; border:1.5px solid var(--amber); border-radius:9px; padding:10px;">Load these quantities into this week's order</button>
      </div>`;
    container.appendChild(card);
  });
}

function toggleHistoryDetail(idx) {
  document.getElementById('hist-detail-' + idx).classList.toggle('hidden');
}

function loadPastOrder(idx) {
  let history = [];
  try { history = JSON.parse(safeStorage.getItem('superone_market_history') || '[]'); } catch (e) { return; }
  const order = history[idx];
  if (!order) return;
  if (!confirm('Replace this week\'s quantities with the order from ' + new Date(order.date).toLocaleDateString() + '?')) return;
  catalog = catalog.map(i => ({ ...i, orderQty: 0 }));
  order.items.forEach(it => {
    const match = catalog.find(c => c.name === it.name && c.category === it.category);
    if (match) match.orderQty = it.qty;
  });
  saveState();
  switchView('shop');
}

function switchView(target) {
  document.getElementById('shop-view').classList.add('hidden');
  document.getElementById('print-view').classList.add('hidden');
  document.getElementById('history-view').classList.add('hidden');
  if (target === 'print') {
    document.getElementById('item-list').innerHTML = ''; // lighten the page for a fast print preview
    document.getElementById('print-view').classList.remove('hidden');
    document.getElementById('report-date').innerText = "Date: " + new Date().toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    renderPrintReport();
  } else if (target === 'history') {
    document.getElementById('item-list').innerHTML = '';
    document.getElementById('history-view').classList.remove('hidden');
    renderHistory();
  } else {
    document.getElementById('shop-view').classList.remove('hidden');
    renderItems(); // restore the shop list
  }
  window.scrollTo(0,0);
}

function clearEntireOrder() {
  if (confirm("Are you sure you want to completely clear this entire weekly order?")) {
    catalog = catalog.map(i => ({ ...i, orderQty: 0 }));
    saveState();
    switchView('shop');
    renderItems();
  }
}

try {
  renderCategories();
  renderItems();
  updateGlobalBadges();
} catch (e) {
  document.getElementById('item-list').innerHTML =
    '<div class="empty-state">' +
    '<p style="margin:0 0 4px;font-weight:700;">Something went wrong loading the item list.</p>' +
    '<p style="margin:0 0 14px;font-size:13px;">' + esc(String(e && e.message || e)) + '</p>' +
    '<button class="add-new" onclick="localStorage.clear();location.reload();">Reset app data and reload</button>' +
    '</div>';
}
</script>
</body>
</html>
